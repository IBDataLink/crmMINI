<!-- index.html (изменённая версия) -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CRM Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    
    <!-- FIXED HEADER (без изменений, но можно добавить кнопку создания сделки) -->
    <header class="app-header">
      <div class="header-left">
        <div class="user-avatar-wrapper">
          <img id="user-avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&h=150&q=80" alt="Avatar" class="avatar-img">
          <span class="avatar-status-badge"></span>
        </div>
        <div class="user-info">
          <span class="user-greeting">Привет,</span>
          <span id="user-name" class="user-name">Гость</span>
        </div>
      </div>
      <div class="header-right">
        <button id="theme-toggle-btn" class="header-action-btn" title="Сменить тему">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <!-- MAIN SCROLLABLE CONTENT -->
    <main class="app-content">
      
      <!-- TAB 1: HOME (CRM) -->
      <section id="tab-home" class="tab-pane active">
        <div class="welcome-section">
          <h1 class="welcome-title">Мои сделки</h1>
          <p class="welcome-subtitle">Управляйте текущими и завершёнными сделками</p>
        </div>

        <!-- Категории-фильтры -->
        <div class="categories-container">
          <div class="categories-scroll">
            <button class="category-pill active" data-filter="active">В работе</button>
            <button class="category-pill" data-filter="completed">Завершённые</button>
          </div>
        </div>

        <!-- Список карточек сделок -->
        <div class="deals-container" id="deals-list">
          <!-- Карточки будут генерироваться динамически -->
        </div>
      </section>

      <!-- TAB 2: DATA (без изменений) -->
      <section id="tab-data" class="tab-pane">
        <!-- ... (оставлен как в исходном коде) ... -->
      </section>

      <!-- TAB 3: CHAT (без изменений) -->
      <section id="tab-chat" class="tab-pane chat-tab-pane">
        <!-- ... -->
      </section>

      <!-- TAB 4: SETTINGS (без изменений) -->
      <section id="tab-settings" class="tab-pane">
        <!-- ... -->
      </section>

    </main>

    <!-- FIXED FOOTER NAVIGATION (без изменений) -->
    <nav class="app-footer">
      <div class="footer-nav-container">
        <div class="footer-dock">
          <button class="dock-btn active" data-target="tab-home" aria-label="Главная">
            <div class="dock-icon-wrapper">
              <svg class="dock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
          </button>
          <button class="dock-btn" data-target="tab-data" aria-label="Панель инструментов">
            <div class="dock-icon-wrapper">
              <svg class="dock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17h6"/><path d="M9 12h6"/><path d="M9 7h6"/></svg>
            </div>
          </button>
          <button class="dock-btn" data-target="tab-chat" aria-label="Чат">
            <div class="dock-icon-wrapper">
              <svg class="dock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
          </button>
          <button class="dock-btn" data-target="tab-settings" aria-label="Настройки">
            <div class="dock-icon-wrapper">
              <svg class="dock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
          </button>
        </div>
      </div>
    </nav>

    <!-- FLOATING ACTION BUTTON (для создания сделки) -->
    <button class="fab" id="create-deal-btn" title="Новая сделка">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- МОДАЛКА ДЕТАЛЕЙ СДЕЛКИ (переработанная) -->
    <div id="details-modal" class="modal-overlay">
      <div class="modal-content-sheet">
        <div class="modal-drag-handle"></div>
        <button class="modal-close-btn" onclick="closeDealDetails()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div id="deal-modal-body">
          <!-- Динамически заполняется -->
        </div>
      </div>
    </div>

    <!-- МОДАЛКА СОЗДАНИЯ/РЕДАКТИРОВАНИЯ СДЕЛКИ -->
    <div id="deal-form-modal" class="modal-overlay flex-modal">
      <div class="dialog-card">
        <h3 class="dialog-title" id="deal-form-title">Новая сделка</h3>
        <input type="hidden" id="deal-form-id">
        <div class="dialog-form-fields">
          <div class="form-group">
            <label for="deal-form-title-input">Наименование *</label>
            <input type="text" id="deal-form-title-input" placeholder="ООО «Компания»">
          </div>
          <div class="form-group">
            <label for="deal-form-bank-input">Банк *</label>
            <input type="text" id="deal-form-bank-input" placeholder="Kaspi / Halyk / Bank RBK">
          </div>
          <div class="form-group">
            <label for="deal-form-amount-input">Сумма (₸) *</label>
            <input type="number" id="deal-form-amount-input" placeholder="100000">
          </div>
          <div class="form-group">
            <label for="deal-form-sender-input">Отправитель *</label>
            <input type="text" id="deal-form-sender-input" placeholder="Иван Иванов">
          </div>
          <div class="form-group">
            <label for="deal-form-date-input">Дата начала</label>
            <input type="date" id="deal-form-date-input">
          </div>
          <div class="form-group">
            <label for="deal-form-comment-input">Комментарий</label>
            <textarea id="deal-form-comment-input" placeholder="Дополнительные детали..."></textarea>
          </div>
        </div>
        <div class="dialog-actions">
          <button class="outline-btn" onclick="closeDealForm()">Отмена</button>
          <button class="primary-btn" id="deal-form-save-btn">Сохранить</button>
        </div>
      </div>
    </div>

    <!-- Остальные модалки (без изменений) -->
    <!-- ... -->
  </div>

  <script src="app.js"></script>
</body>
</html>
